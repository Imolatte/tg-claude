name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: What would you like to see added?
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: How would you use this feature?
    validations:
      required: false
